<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Official Report Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        body { background-color: #f1f5f9; font-family: 'Roboto', sans-serif; }
        
        .marksheet-container {
            width: 210mm;
            min-height: 297mm;
            padding: 10px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
            border: 2px solid #4a3392;
            box-sizing: border-box;
        }

        .header-bg { background-color: #6d59c0; color: white; }
        .label-cell { background-color: #e8edff; color: #3b4ca8; font-weight: bold; border: 1px solid #94a3b8; font-size: 12px; padding: 4px 8px; }
        .value-cell { border: 1px solid #94a3b8; font-size: 13px; font-weight: bold; text-align: center; padding: 4px; color: #000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { background-color: #74b9ff; color: white; border: 1px solid #4a3392; font-size: 10px; padding: 4px 2px; }
        td { border: 1px solid #4a3392; text-align: center; font-size: 13px; font-weight: bold; height: 30px; }
        .sub-name { color: #b91c1c; text-align: left; padding-left: 10px; font-size: 15px; }

        .section-header { background-color: #a55eea; color: white; font-weight: bold; text-align: center; padding: 4px; font-size: 16px; border: 1px solid #4a3392; }
        .grade-key-header { background-color: #f7b731; }
        .proficiency-header { background-color: #eb4d4b; }
        .results-header { background-color: #686de0; }

        .bar-container { display: flex; align-items: flex-end; justify-content: space-around; height: 100px; padding: 10px; border: 1px solid #ccc; background: #fff; margin-bottom: 5px; }
        .bar { width: 22px; background: #4a90e2; position: relative; border-radius: 2px 2px 0 0; }
        .bar-label { position: absolute; top: -18px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; color: #333; }
        .sub-label { position: absolute; bottom: -20px; width: 60px; left: 50%; transform: translateX(-50%); font-size: 9px; text-align: center; color: #555; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .marksheet-container { margin: 0 auto; border: 2px solid #4a3392; zoom: 100%; page-break-after: always; }
        }
    </style>
</head>
<body>

    <div class="no-print max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-lg mb-10 border-t-8 border-purple-700">
        <h2 class="text-3xl font-black text-purple-900 mb-4">GPS Pethgam - Official Marksheet Generator</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="p-4 border-2 border-dashed border-blue-300 rounded-lg bg-blue-50">
                <p class="font-bold text-blue-800 mb-2">1. Upload Student Photos</p>
                <input type="file" id="photoUpload" multiple accept="image/*" class="w-full text-sm" />
            </div>
            <div class="p-4 border-2 border-dashed border-green-300 rounded-lg bg-green-50">
                <p class="font-bold text-green-800 mb-2">2. Upload Excel Master Sheet</p>
                <input type="file" id="excelUpload" accept=".xlsx, .xls" class="w-full text-sm" />
            </div>
        </div>
        <button onclick="window.print()" class="mt-6 bg-purple-700 text-white px-8 py-3 rounded-lg font-bold hover:bg-purple-800 shadow-lg transition">PRINT ALL MARKSHEETS</button>
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        let studentPhotos = {};

        function formatDate(excelDate) {
            if(!excelDate) return "";
            if(!isNaN(excelDate)) {
                const date = new Date((excelDate - 25569) * 86400 * 1000);
                return date.toLocaleDateString('en-GB');
            }
            return excelDate;
        }

        // Logic fix for Proficiency calculation
        function getProficiency(score, max = 100) {
            const pct = (score / max) * 100;
            if (pct >= 85) return "Sky";
            if (pct >= 60) return "Mountain";
            return "Stream";
        }

        function getGrade(score, max = 100) {
            const pct = (score / max) * 100;
            if (pct > 85) return "A+";
            if (pct > 70) return "A";
            if (pct > 55) return "B";
            if (pct > 40) return "C";
            if (pct > 33) return "D";
            return "E";
        }

        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            for (let file of e.target.files) {
                const admNo = file.name.split('.')[0].trim();
                const reader = new FileReader();
                studentPhotos[admNo] = await new Promise(r => {
                    reader.onload = (ev) => r(ev.target.result);
                    reader.readAsDataURL(file);
                });
            }
            alert(Object.keys(studentPhotos).length + " photos processed.");
        });

        document.getElementById('excelUpload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                generateMarksheets(rows);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function generateMarksheets(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';

            for (let i = 3; i < rows.length; i++) {
                let r = rows[i];
                if (!r[0]) continue; 

                const admNo = String(r[0]).trim();
                const photo = studentPhotos[admNo] || '';

                const engTot = parseInt(r[17]) || 0;
                const matTot = parseInt(r[27]) || 0;
                const evsTot = parseInt(r[37]) || 0;
                const urdTot = parseInt(r[47]) || 0;
                const kasTot = parseInt(r[57]) || 0;
                
                const grandTotal = engTot + matTot + evsTot + urdTot + kasTot;
                const percentage = Math.round((grandTotal / 500) * 100);
                const overallProf = getProficiency(grandTotal, 500);

                const div = document.createElement('div');
                div.className = 'marksheet-container';
                div.innerHTML = `
                    <div class="header-bg flex items-center p-3">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center border-2 border-yellow-400">
                           <span class="text-indigo-900 font-black text-center text-[10px]">SCHOOL<br>LOGO</span>
                        </div>
                        <div class="flex-grow text-center">
                            <h1 class="text-3xl font-black tracking-tighter">GOVERNMENT PRIMARY SCHOOL</h1>
                            <h2 class="text-xl font-bold">PETHGAM WAGOORA 193109</h2>
                        </div>
                    </div>

                    <div class="flex border-x-2 border-b-2 border-purple-900">
                        <div class="flex-grow grid grid-cols-4">
                            <div class="label-cell">Student Name:</div><div class="value-cell">${r[3] || ''}</div>
                            <div class="label-cell">Adm. No:</div><div class="value-cell">${admNo}</div>
                            <div class="label-cell">Fathers Name:</div><div class="value-cell">${r[4] || ''}</div>
                            <div class="label-cell">D.O.B:</div><div class="value-cell">${formatDate(r[7])}</div>
                            <div class="label-cell">Mothers Name:</div><div class="value-cell">${r[5] || ''}</div>
                            <div class="label-cell">Class:</div><div class="value-cell">${r[2] || ''}</div>
                            <div class="label-cell">Academic Session:</div><div class="value-cell">Nov.-Dec. 2024</div>
                            <div class="label-cell">Roll No:</div><div class="value-cell">${r[1] || ''}</div>
                            <div class="label-cell">Apaar ID:</div><div class="value-cell">Not Available</div>
                            <div class="label-cell">PEN No.</div><div class="value-cell">${r[6] || ''}</div>
                        </div>
                        <div class="w-32 border-l-2 border-purple-900 flex items-center justify-center bg-gray-50">
                            ${photo ? `<img src="${photo}" class="w-full h-full object-cover">` : `<div class="text-[10px] text-gray-400 text-center">PASSPORT PHOTO</div>`}
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th class="w-28">Subject</th>
                                <th>FA1(5)</th><th>FA2(5)</th><th>FA3(5)</th><th>FA4(5)</th><th>FA5(5)</th><th>FA6(5)</th>
                                <th>Total(30)</th><th>Co-Curr(20)</th><th>Sum(50)</th><th>Total(100)</th><th>Grade</th><th>Prof.</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${renderRow("English", r, 8)}
                            ${renderRow("Math", r, 18)}
                            ${renderRow("EVS", r, 28)}
                            ${renderRow("Urdu", r, 38)}
                            ${renderRow("Kashmiri", r, 48)}
                            <tr class="bg-gray-100">
                                <td class="sub-name">Grand Total</td>
                                <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
                                <td class="bg-blue-100">128</td>
                                <td>86</td>
                                <td>212</td>
                                <td class="bg-yellow-100">${grandTotal}</td>
                                <td>${getGrade(grandTotal, 500)}</td>
                                <td>${overallProf}</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <div>
                            <div class="section-header grade-key-header">Percentage/Grade Key</div>
                            <table class="text-[10px]">
                                <tr class="bg-cyan-50"><th>%age Scale</th><th>Grade</th></tr>
                                <tr><td>>85% to 100%</td><td>A+</td></tr>
                                <tr><td>>70% to 85%</td><td>A</td></tr>
                                <tr><td>>55% to 70%</td><td>B</td></tr>
                                <tr><td>>40% to 55%</td><td>C</td></tr>
                                <tr><td>>33% to 40%</td><td>D</td></tr>
                                <tr><td>0% to 33%</td><td>E</td></tr>
                            </table>
                        </div>

                        <div>
                            <div class="section-header proficiency-header">Level of Proficiency</div>
                            <table class="text-[10px]">
                                <tr><td>Sky</td><td>☁️</td><td>${overallProf === 'Sky' ? '✔' : ''}</td></tr>
                                <tr><td>Mountain</td><td>🏔️</td><td>${overallProf === 'Mountain' ? '✔' : ''}</td></tr>
                                <tr><td>Stream</td><td>🌊</td><td>${overallProf === 'Stream' ? '✔' : ''}</td></tr>
                                <tr class="bg-gray-700 text-white font-bold"><td colspan="2">School Rank</td><td>5</td></tr>
                            </table>
                        </div>

                        <div>
                            <div class="section-header results-header">Final Results</div>
                            <div class="border-2 border-indigo-600 p-1 text-[13px] font-bold">
                                <div class="flex justify-between border-b"><span>Total Obtained:</span> <span>${grandTotal}</span></div>
                                <div class="flex justify-between border-b"><span>Max Marks:</span> <span>500</span></div>
                                <div class="flex justify-between border-b text-blue-800"><span>Percentage:</span> <span>${percentage}%</span></div>
                                <div class="flex justify-between border-b"><span>Overall Grade:</span> <span>${getGrade(grandTotal, 500)}</span></div>
                                <div class="flex justify-between text-green-700"><span>Result:</span> <span>PASS</span></div>
                            </div>
                            <div class="mt-1 bg-gray-800 text-white p-1 text-center font-bold text-xs">Class Rank: 1</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <div class="border border-purple-900 p-2">
                            <div class="bar-container">
                                ${renderBar("Eng", engTot)} ${renderBar("Math", matTot)} ${renderBar("EVS", evsTot)} ${renderBar("Urdu", urdTot)} ${renderBar("Kas", kasTot)}
                            </div>
                            <div class="bg-orange-400 text-white text-center font-bold text-[10px] p-1">Subject wise Bar Graph Chart</div>
                        </div>
                        <div class="flex flex-col">
                            <div class="bg-purple-800 text-white text-center font-bold p-1 text-xs">General Remarks</div>
                            <div class="border flex-grow p-2 text-[12px] italic">
                                ${r[3]} has performed well in all core subjects. Maintain this consistency and focus on Art & Craft.
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2 mt-16 text-[9px] font-bold text-center">
                        <div class="border-t border-black pt-1">Sign. Form Teacher</div>
                        <div class="border-t border-black pt-1">Sign. Exam I/C</div>
                        <div class="border-t border-black pt-1">Parents Signature</div>
                        <div class="border-t border-black pt-1">Seal & Signature of Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
            }
        }

        function renderRow(name, r, s) {
            const subjectTotal = parseInt(r[s+9]) || 0;
            const proficiency = getProficiency(subjectTotal, 100);
            const grade = getGrade(subjectTotal, 100);

            return `<tr>
                <td class="sub-name">${name}</td>
                <td>${r[s]||0}</td><td>${r[s+1]||0}</td><td>${r[s+2]||0}</td><td>${r[s+3]||0}</td><td>${r[s+4]||0}</td><td>${r[s+5]||0}</td>
                <td class="bg-blue-50">${r[s+6]||0}</td><td>${r[s+7]||0}</td><td>${r[s+8]||0}</td>
                <td class="bg-yellow-50">${subjectTotal}</td>
                <td>${grade}</td>
                <td>${proficiency}</td>
            </tr>`;
        }

        function renderBar(label, val) {
            const h = Math.min(val || 0, 100);
            return `<div class="bar" style="height: ${h}%"><span class="bar-label">${val || 0}</span><span class="sub-label">${label}</span></div>`;
        }
    </script>
</body>
</html>
