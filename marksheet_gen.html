<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Result Management System - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print { .no-print { display: none; } .page-break { page-break-after: always; } }
        .marksheet-container {
            width: 210mm;
            min-height: 297mm;
            padding: 5mm;
            margin: auto;
            border: 5px double #4338ca;
            background-color: white;
            font-family: Arial, sans-serif;
        }
        .header-bg { background-color: #6d59c0; color: white; border: 1px solid #000; }
        .cell-label { background-color: #f1f5f9; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 11px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 12px; font-weight: bold; text-align: center; }
        .subject-row td { border: 1px solid #94a3b8; padding: 2px; font-size: 12px; text-align: center; }
        .subject-name { color: #b91c1c; font-weight: bold; text-align: left !important; padding-left: 5px !important; }
        .grade-a-plus { color: #15803d; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-200 p-5">

    <div class="no-print max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg mb-10 border-t-4 border-indigo-600">
        <h2 class="text-2xl font-bold text-indigo-700 mb-2">GPS Pethgam Wagoora Marksheet Generator</h2>
        <p class="text-sm text-gray-500 mb-4">Ensure Excel columns match: Name, Father, Mother, Session, ApaarID, AdmNo, DOB, Class, RollNo, PEN, [Subject]_FA1..FA6, [Subject]_CC, [Subject]_SA</p>
        
        <input type="file" id="excelUpload" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
        <button onclick="window.print()" class="mt-4 bg-blue-600 text-white px-8 py-2 rounded-md hover:bg-blue-700 font-bold">PRINT ALL</button>
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                generateMarksheets(jsonData);
            };
            reader.readAsArrayBuffer(file);
        });

        function generateMarksheets(students) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = ''; 

            students.forEach(student => {
                const sheet = document.createElement('div');
                sheet.className = 'marksheet-container mb-10 page-break';
                
                sheet.innerHTML = `
                    <div class="flex items-center justify-between header-bg p-2 mb-1">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center p-1">
                            <img src="new-logo.png" alt="Logo" class="w-full">
                        </div>
                        <div class="text-center flex-grow">
                            <h1 class="text-3xl font-extrabold tracking-tighter">GOVERNMENT PRIMARY SCHOOL</h1>
                            <h2 class="text-2xl font-bold">PETHGAM WAGOORA 193109</h2>
                        </div>
                        <div class="w-20 h-24 border-2 border-white overflow-hidden bg-gray-200">
                           <p class="text-[10px] text-center mt-8">Photo</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-6 mb-1">
                        <div class="cell-label col-span-1">Student Name:</div>
                        <div class="cell-value col-span-2">${student.Name || ''}</div>
                        <div class="cell-label col-span-1">Adm. No:</div>
                        <div class="cell-value col-span-2">${student.AdmNo || ''}</div>
                        
                        <div class="cell-label col-span-1">Fathers Name:</div>
                        <div class="cell-value col-span-2">${student.Father || ''}</div>
                        <div class="cell-label col-span-1">D.O.B:</div>
                        <div class="cell-value col-span-2">${student.DOB || ''}</div>

                        <div class="cell-label col-span-1">Mothers Name:</div>
                        <div class="cell-value col-span-2">${student.Mother || ''}</div>
                        <div class="cell-label col-span-1">Class:</div>
                        <div class="cell-value col-span-2">${student.Class || ''}</div>

                        <div class="cell-label col-span-1">Academic Session:</div>
                        <div class="cell-value col-span-2">${student.Session || '2024'}</div>
                        <div class="cell-label col-span-1">Roll No:</div>
                        <div class="cell-value col-span-2">${student.RollNo || ''}</div>

                        <div class="cell-label col-span-1">Apaar ID:</div>
                        <div class="cell-value col-span-2">${student.ApaarID || 'Not Available'}</div>
                        <div class="cell-label col-span-1">PEN No.</div>
                        <div class="cell-value col-span-2">${student.PEN || ''}</div>
                    </div>

                    <table class="w-full border-collapse border border-slate-400 text-[11px]">
                        <thead class="bg-blue-100 text-[10px]">
                            <tr>
                                <th class="border border-slate-400 p-1">Subject</th>
                                <th class="border border-slate-400 p-1">FA1 (5)</th>
                                <th class="border border-slate-400 p-1">FA2 (5)</th>
                                <th class="border border-slate-400 p-1">FA3 (5)</th>
                                <th class="border border-slate-400 p-1">FA4 (5)</th>
                                <th class="border border-slate-400 p-1">FA5 (5)</th>
                                <th class="border border-slate-400 p-1">FA6 (5)</th>
                                <th class="border border-slate-400 p-1">Total (30)</th>
                                <th class="border border-slate-400 p-1">Co-Curr (20)</th>
                                <th class="border border-slate-400 p-1">Summ (50)</th>
                                <th class="border border-slate-400 p-1">Grand (100)</th>
                                <th class="border border-slate-400 p-1">Grade</th>
                                <th class="border border-slate-400 p-1">Level</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${generateSubjectRows(student)}
                        </tbody>
                    </table>

                    <div class="grid grid-cols-3 gap-1 mt-2">
                        <div class="col-span-1 border border-slate-400 p-1">
                            <div class="bg-purple-700 text-white text-center font-bold text-xs p-1 mb-1">Percentage/Grade Key</div>
                            <table class="w-full text-[10px] text-center border">
                                <tr class="bg-blue-200"><td>>85% to 100%</td><td>A+</td></tr>
                                <tr><td>>70% to 85%</td><td>A</td></tr>
                                <tr><td>>55% to 70%</td><td>B</td></tr>
                                <tr><td>>40% to 55%</td><td>C</td></tr>
                                <tr><td>>33% to 40%</td><td>D</td></tr>
                                <tr><td>0% to 33%</td><td>E</td></tr>
                            </table>
                        </div>
                        <div class="col-span-1 border border-slate-400 p-1 text-center">
                             <div class="bg-red-600 text-white font-bold text-xs p-1 mb-1">Level of Proficiency</div>
                             <div class="text-[10px]">Sky (✔) | Mountain | Stream</div>
                             <div class="mt-2 text-xs font-bold">School Rank: ${student.SchoolRank || '-'}</div>
                        </div>
                        <div class="col-span-1 border border-slate-400 p-1">
                             <div class="bg-purple-700 text-white text-center font-bold text-xs p-1 mb-1">Final Results</div>
                             <div class="text-xs space-y-1">
                                <div class="flex justify-between"><span>Total:</span> <span>${student.TotalMarks || 0}/500</span></div>
                                <div class="flex justify-between"><span>Percentage:</span> <span>${student.Percentage || 0}%</span></div>
                                <div class="flex justify-between bg-gray-200 p-1 font-bold"><span>Class Rank:</span> <span>${student.Rank || '1'}</span></div>
                             </div>
                        </div>
                    </div>

                    <div class="mt-10 grid grid-cols-4 gap-4 text-center text-[10px] font-bold">
                        <div class="border-t border-black pt-1">Sign. Form Teacher</div>
                        <div class="border-t border-black pt-1">Sign. Exam I/C</div>
                        <div class="border-t border-black pt-1">Parents Signature</div>
                        <div class="border-t border-black pt-1">Seal & Sign. Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(sheet);
            });
        }

        function generateSubjectRows(s) {
            const subs = ['English', 'Math', 'EVS', 'Urdu', 'Kashmiri'];
            return subs.map(sub => `
                <tr class="subject-row">
                    <td class="subject-name">${sub}</td>
                    <td>${s[sub+'_FA1']||0}</td><td>${s[sub+'_FA2']||0}</td><td>${s[sub+'_FA3']||0}</td>
                    <td>${s[sub+'_FA4']||0}</td><td>${s[sub+'_FA5']||0}</td><td>${s[sub+'_FA6']||0}</td>
                    <td class="font-bold">${s[sub+'_FATotal']||0}</td>
                    <td>${s[sub+'_CC']||0}</td>
                    <td>${s[sub+'_SA']||0}</td>
                    <td class="font-bold bg-gray-50">${s[sub+'_Total']||0}</td>
                    <td class="grade-a-plus">${s[sub+'_Grade']||'A+'}</td>
                    <td>Sky</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
