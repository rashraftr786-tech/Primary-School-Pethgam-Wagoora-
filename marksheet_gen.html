<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 15px; }
        .upload-box { 
            background: white; border-radius: 12px; padding: 25px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px; margin: 0 auto 20px;
        }
        #processBtn {
            background: #2196F3; color: white; border: none; 
            padding: 12px 25px; border-radius: 5px; font-weight: bold;
            margin-top: 15px; display: none; width: 100%;
        }
        .marksheet { 
            background: white; border: 2px solid #000; padding: 20px; 
            margin: 20px auto; max-width: 750px; min-height: 800px;
        }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 13px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        @media print {
            .no-print { display: none; }
            .marksheet { border: 1px solid #000; margin: 0; width: 100%; page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="upload-box no-print">
    <h2 style="margin-top:0;">Student Result Portal</h2>
    <p>Step 1: Choose your CSV file</p>
    <input type="file" id="csvFile" accept=".csv">
    
    <div id="fileInfo" style="margin-top:15px; color: #666; font-size: 14px;"></div>
    
    <button id="processBtn">Step 2: Process & View Marksheets</button>
</div>

<div id="output"></div>

<script>
    const fileInput = document.getElementById('csvFile');
    const processBtn = document.getElementById('processBtn');
    const fileInfo = document.getElementById('fileInfo');
    const output = document.getElementById('output');

    // Detect when file is chosen
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            fileInfo.innerHTML = "Selected: <b>" + e.target.files[0].name + "</b>";
            processBtn.style.display = "block"; // Show the button
        }
    });

    // Process the file when button is clicked
    processBtn.addEventListener('click', function() {
        const file = fileInput.files[0];
        
        Papa.parse(file, {
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                if (data.length < 4) {
                    alert("The file seems empty or has too few rows.");
                    return;
                }
                renderMarksheets(data);
            }
        });
    });

    function renderMarksheets(data) {
        output.innerHTML = "";
        // Your data starts at row 3 (index 2 or 3)
        for (let i = 3; i < data.length; i++) {
            const row = data[i];
            if (!row[3]) continue; // Skip if no Name

            output.innerHTML += `
                <div class="marksheet">
                    <div class="header">
                        <h2 style="margin:0;">PROGRESS REPORT CARD</h2>
                        <p style="margin:5px;">Academic Session 2024-25</p>
                    </div>

                    <div style="display:flex; justify-content: space-between; margin-top:15px;">
                        <div>
                            <p><strong>Student:</strong> ${row[3]}</p>
                            <p><strong>Father:</strong> ${row[4]}</p>
                        </div>
                        <div style="text-align:right;">
                            <p><strong>Roll No:</strong> ${row[1]}</p>
                            <p><strong>Class:</strong> 1st</p>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>FA (30)</th>
                                <th>SA (50)</th>
                                <th>Co-Curr (20)</th>
                                <th>Total (100)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td>English</td><td>${row[14]}</td><td>${row[16]}</td><td>${row[15]}</td><td>${row[17]}</td></tr>
                            <tr><td>Mathematics</td><td>${row[24]}</td><td>${row[26]}</td><td>${row[25]}</td><td>${row[27]}</td></tr>
                            <tr><td>EVS</td><td>${row[34]}</td><td>${row[36]}</td><td>${row[35]}</td><td>${row[37]}</td></tr>
                            <tr><td>Urdu</td><td>${row[44]}</td><td>${row[46]}</td><td>${row[45]}</td><td>${row[47]}</td></tr>
                        </tbody>
                    </table>

                    <div style="margin-top:20px; border-top: 1px solid #ccc; padding-top:10px;">
                        <p><strong>Grand Total:</strong> ${row[58]} / 500</p>
                        <p><strong>Percentage:</strong> ${row[59]}% &nbsp;&nbsp; <strong>Grade:</strong> ${row[61]}</p>
                    </div>

                    <button class="no-print" onclick="window.print()" style="margin-top:20px; padding:10px; cursor:pointer;">Print/Save PDF</button>
                </div>
            `;
        }
        // Hide the upload box after processing to see results clearly
        document.querySelector('.upload-box').style.display = 'none';
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
