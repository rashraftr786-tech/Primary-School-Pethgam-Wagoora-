<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Official Report Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { background-color: #f1f5f9; font-family: 'Roboto', sans-serif; margin: 0; }
        
        .marksheet-container {
            width: 210mm;
            height: 297mm;
            padding: 8mm;
            margin: 10px auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border: 2px solid #4a3392;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-bg { background-color: #6d59c0; color: white; }
        .label-cell { background-color: #e8edff; color: #3b4ca8; font-weight: bold; border: 1px solid #94a3b8; font-size: 11px; padding: 3px 6px; }
        .value-cell { border: 1px solid #94a3b8; font-size: 12px; font-weight: bold; text-align: center; padding: 3px; color: #000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 4px; }
        th { background-color: #74b9ff; color: white; border: 1px solid #4a3392; font-size: 9px; padding: 2px; }
        td { border: 1px solid #4a3392; text-align: center; font-size: 11px; font-weight: bold; height: 24px; }
        .sub-name { color: #b91c1c; text-align: left; padding-left: 8px; font-size: 13px; }

        .section-header { background-color: #a55eea; color: white; font-weight: bold; text-align: center; padding: 3px; font-size: 13px; border: 1px solid #4a3392; }
        .grade-key-header { background-color: #f7b731; }
        .proficiency-header { background-color: #eb4d4b; }
        .results-header { background-color: #686de0; }

        /* Metrics Table Styles */
        .metrics-label { background-color: #b33939; color: white; text-align: left; padding-left: 8px; font-size: 10px; border: 1px solid white; }
        .metrics-value { background-color: #fdf2f2; border: 1px solid #b33939; }

        .bar-container { display: flex; align-items: flex-end; justify-content: space-around; height: 75px; padding: 8px; border: 1px solid #ccc; background: #fff; }
        .bar { width: 18px; background: #4a90e2; position: relative; border-radius: 2px 2px 0 0; }
        .bar-label { position: absolute; top: -14px; width: 100%; text-align: center; font-size: 9px; font-weight: bold; }
        .sub-label { position: absolute; bottom: -16px; width: 45px; left: 50%; transform: translateX(-50%); font-size: 8px; text-align: center; color: #555; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .marksheet-container { margin: 0; border: 2px solid #4a3392; page-break-after: always; }
        }
    </style>
</head>
<body>

    <div class="no-print max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-lg mb-10 border-t-8 border-purple-700">
        <h2 class="text-2xl font-black text-purple-900 mb-4">GPS Pethgam - Official Marksheet Generator</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="p-4 border-2 border-dashed border-blue-300 rounded-lg bg-blue-50">
                <p class="font-bold text-blue-800 mb-2">1. Upload Photos (Name files as AdmNo.jpg)</p>
                <input type="file" id="photoUpload" multiple accept="image/*" class="w-full text-sm" />
            </div>
            <div class="p-4 border-2 border-dashed border-green-300 rounded-lg bg-green-50">
                <p class="font-bold text-green-800 mb-2">2. Upload Excel Master Sheet</p>
                <input type="file" id="excelUpload" accept=".xlsx, .xls" class="w-full text-sm" />
            </div>
        </div>
        <button onclick="window.print()" class="mt-4 bg-purple-700 text-white px-8 py-2 rounded font-bold hover:bg-purple-800">PRINT ALL</button>
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        let studentPhotos = {};

        // Fixed photo mapping logic
        document.getElementById('photoUpload').addEventListener('change', (e) => {
            const files = e.target.files;
            for (let file of files) {
                const admNo = file.name.split('.')[0].trim();
                const reader = new FileReader();
                reader.onload = (ev) => { studentPhotos[admNo] = ev.target.result; };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('excelUpload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                generateMarksheets(rows);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function getProficiency(score, max = 100) {
            const pct = (score / max) * 100;
            if (pct >= 85) return "Sky";
            if (pct >= 60) return "Mountain";
            return "Stream";
        }

        function getGrade(score, max = 100) {
            const pct = (score / max) * 100;
            if (pct > 85) return "A+"; if (pct > 70) return "A"; if (pct > 55) return "B";
            if (pct > 40) return "C"; if (pct > 33) return "D"; return "E";
        }

        function generateMarksheets(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';

            for (let i = 3; i < rows.length; i++) {
                let r = rows[i];
                if (!r[0]) continue; 

                const admNo = String(r[0]).trim();
                const photo = studentPhotos[admNo] || '';
                const engTot = parseInt(r[17]) || 0;
                const matTot = parseInt(r[27]) || 0;
                const evsTot = parseInt(r[37]) || 0;
                const urdTot = parseInt(r[47]) || 0;
                const kasTot = parseInt(r[57]) || 0;
                const grandTotal = engTot + matTot + evsTot + urdTot + kasTot;
                const overallProf = getProficiency(grandTotal, 500);

                const div = document.createElement('div');
                div.className = 'marksheet-container';
                div.innerHTML = `
                    <div class="header-bg flex items-center p-2">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center border-2 border-yellow-400">
                           <span class="text-indigo-900 font-black text-center text-[8px]">LOGO</span>
                        </div>
                        <div class="flex-grow text-center">
                            <h1 class="text-2xl font-black">GOVERNMENT PRIMARY SCHOOL</h1>
                            <h2 class="text-lg font-bold">PETHGAM WAGOORA 193109</h2>
                        </div>
                    </div>

                    <div class="flex border-x-2 border-b-2 border-purple-900">
                        <div class="flex-grow grid grid-cols-4">
                            <div class="label-cell">Student Name:</div><div class="value-cell">${r[3] || ''}</div>
                            <div class="label-cell">Adm. No:</div><div class="value-cell">${admNo}</div>
                            <div class="label-cell">Fathers Name:</div><div class="value-cell">${r[4] || ''}</div>
                            <div class="label-cell">Class:</div><div class="value-cell">${r[2] || ''}</div>
                        </div>
                        <div class="w-28 border-l-2 border-purple-900 flex items-center justify-center bg-gray-50">
                            ${photo ? `<img src="${photo}" class="w-full h-full object-cover">` : `<div class="text-[10px] text-gray-400">PASSPORT PHOTO</div>`}
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th class="w-24">Subject</th>
                                <th>FA1-FA6</th><th>Total(30)</th><th>Co-Curr(20)</th><th>Sum(50)</th><th>Total(100)</th><th>Grade</th><th>Prof.</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${renderRow("English", engTot)} ${renderRow("Math", matTot)} 
                            ${renderRow("EVS", evsTot)} ${renderRow("Urdu", urdTot)} 
                            ${renderRow("Kashmiri", kasTot)}
                            <tr class="bg-gray-100 font-bold">
                                <td class="sub-name">Grand Total</td><td>-</td><td>128</td><td>86</td><td>212</td>
                                <td class="bg-yellow-100">${grandTotal}</td><td>${getGrade(grandTotal, 500)}</td><td>${overallProf}</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <div>
                            <div class="section-header grade-key-header">Grade Key</div>
                            <table class="text-[9px]">
                                <tr><td>>85% to 100%</td><td>A+</td></tr>
                                <tr><td>>70% to 85%</td><td>A</td></tr>
                                <tr><td>>55% to 70%</td><td>B</td></tr>
                                <tr><td>>40% to 55%</td><td>C</td></tr>
                            </table>
                        </div>
                        <div>
                            <div class="section-header proficiency-header">Proficiency</div>
                            <table class="text-[9px]">
                                <tr><td>Sky</td><td>${overallProf === 'Sky' ? '✔' : ''}</td></tr>
                                <tr><td>Mountain</td><td>${overallProf === 'Mountain' ? '✔' : ''}</td></tr>
                                <tr><td>Stream</td><td>${overallProf === 'Stream' ? '✔' : ''}</td></tr>
                            </table>
                        </div>
                        <div>
                            <div class="section-header results-header">Final Results</div>
                            <div class="border border-indigo-600 p-1 text-[11px]">
                                <div class="flex justify-between"><span>Percentage:</span> <span>${Math.round(grandTotal/5)}%</span></div>
                                <div class="flex justify-between"><span>Result:</span> <span class="text-green-700">PASS</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-12 gap-2 mt-2">
                        <div class="col-span-4 flex items-center justify-center border-2 border-dashed border-gray-300 bg-gray-50">
                            <div class="text-center p-2">
                                <div class="w-16 h-16 bg-black mx-auto mb-1"></div>
                                <span class="text-[8px] font-bold">VERIFICATION QR</span>
                            </div>
                        </div>
                        <div class="col-span-8">
                            <table class="w-full">
                                <tr><td class="metrics-label">Attendance %age</td><td class="metrics-value">92%</td></tr>
                                <tr><td class="metrics-label">Empathy & Teamwork</td><td class="metrics-value">Excellent</td></tr>
                                <tr><td class="metrics-label">Discipline</td><td class="metrics-value">Very Good</td></tr>
                                <tr><td class="metrics-label">Sports</td><td class="metrics-value">A</td></tr>
                                <tr><td class="metrics-label">Art and Craft</td><td class="metrics-value">B+</td></tr>
                            </table>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div class="border border-purple-900 p-2">
                            <div class="bar-container">
                                ${renderBar("Eng", engTot)} ${renderBar("Math", matTot)} ${renderBar("EVS", evsTot)} ${renderBar("Urdu", urdTot)} ${renderBar("Kas", kasTot)}
                            </div>
                            <div class="bg-orange-400 text-white text-center text-[8px] p-1 font-bold">Subject wise Growth</div>
                        </div>
                        <div class="flex flex-col">
                            <div class="bg-purple-800 text-white text-center font-bold p-1 text-xs">General Remarks</div>
                            <div class="border flex-grow p-2 text-[10px] italic">
                                ${r[3]} has performed well. Consistent effort is advised for further growth.
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2 mt-auto pb-4 text-[8px] font-bold text-center">
                        <div class="border-t border-black pt-1">Sign. Teacher</div>
                        <div class="border-t border-black pt-1">Exam I/C</div>
                        <div class="border-t border-black pt-1">Parents</div>
                        <div class="border-t border-black pt-1">Headmaster Seal</div>
                    </div>
                `;
                wrapper.appendChild(div);
            }
        }

        function renderRow(name, tot) {
            return `<tr><td class="sub-name">${name}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>${tot}</td><td>${getGrade(tot)}</td><td>${getProficiency(tot)}</td></tr>`;
        }

        function renderBar(label, val) {
            return `<div class="bar" style="height: ${val}%"><span class="bar-label">${val}</span><span class="sub-label">${label}</span></div>`;
        }
    </script>
</body>
</html>
