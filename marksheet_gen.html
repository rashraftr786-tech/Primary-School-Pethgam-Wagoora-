<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Pethgam Wagoora - Official Marksheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #marksheetWrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        @media screen and (max-width: 210mm) { .marksheet-container { zoom: 0.85; } }
        @media screen and (max-width: 640px) { .marksheet-container { zoom: 0.45; margin: -180px auto !important; } }
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .marksheet-container { margin: 0 auto; border: 5px solid #6d59c0 !important; zoom: 1 !important; page-break-after: always; }
        }
        body { background-color: #e2e8f0; padding: 20px; font-family: sans-serif; }
        .marksheet-container { width: 210mm; min-height: 285mm; padding: 10px; margin: 20px auto; border: 5px solid #6d59c0; background: white; box-sizing: border-box; }
        .header-bg { background-color: #6d59c0; color: white; text-align: center; }
        .cell-label { background-color: #e0e7ff; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 11px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 12px; font-weight: bold; text-align: center; color: #000; min-height: 25px; }
        table { border-collapse: collapse; width: 100%; margin-top: 2px; }
        th, td { border: 1px solid #94a3b8; text-align: center; font-size: 10px; padding: 3px; }
        .sub-name { color: #b91c1c; text-align: left; font-weight: bold; padding-left: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="no-print max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-xl mb-10 border-b-4 border-indigo-600">
        <h2 class="text-2xl font-bold text-indigo-900 mb-2">GPS Pethgam - Master Generator</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="border p-3 rounded bg-green-50">
                <label class="block text-sm font-bold text-green-800">1. Upload Photos (Name them e.g. 116.jpg)</label>
                <input type="file" id="photoUpload" multiple accept="image/*" class="mt-1 block w-full text-xs" />
            </div>
            <div class="border p-3 rounded bg-indigo-50">
                <label class="block text-sm font-bold text-indigo-800">2. Upload Excel Master Sheet</label>
                <input type="file" id="excelUpload" accept=".xlsx, .xls" class="mt-1 block w-full text-xs" />
            </div>
        </div>
        <button onclick="window.print()" class="mt-4 w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition">PRINT ALL MARKSHEETS</button>
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        let studentPhotos = {};

        // Handle Photos
        document.getElementById('photoUpload').addEventListener('change', async (e) => {
            for (let file of e.target.files) {
                const admNo = file.name.split('.')[0].trim();
                const reader = new FileReader();
                studentPhotos[admNo] = await new Promise(r => {
                    reader.onload = (ev) => r(ev.target.result);
                    reader.readAsDataURL(file);
                });
            }
            alert(Object.keys(studentPhotos).length + " photos loaded.");
        });

        // Handle Excel (Custom Multi-Row Parser)
        document.getElementById('excelUpload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Convert to 2D Array first to handle your complex headers
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                processMasterRows(rows);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function processMasterRows(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';

            // Based on your screenshot:
            // Column A=0 (Adm No), B=1 (Roll), C=2 (Class), D=3 (Name), E=4 (Father), F=5 (Mother), H=7 (DOB)
            // English starts at Column I (8), Math at S (18), EVS at AC (28), Urdu at AM (38), Kashmiri at AW (48)

            for (let i = 3; i < rows.length; i++) {
                let r = rows[i];
                if (!r[0]) continue; // Skip empty rows

                const admNo = String(r[0]).trim();
                const photo = studentPhotos[admNo];

                const div = document.createElement('div');
                div.className = 'marksheet-container';
                div.innerHTML = `
                    <div class="flex items-center header-bg p-3">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-indigo-900 font-bold border-2 border-yellow-400 text-[8px]">LOGO</div>
                        <div class="flex-grow text-center">
                            <h1 class="text-2xl font-black uppercase">Government Primary School</h1>
                            <h2 class="text-lg font-bold">Pethgam Wagoora 193109</h2>
                        </div>
                    </div>

                    <div class="flex mt-2 border-2 border-indigo-900">
                        <div class="flex-grow grid grid-cols-4">
                            <div class="cell-label">Student Name:</div><div class="cell-value">${r[3] || ''}</div>
                            <div class="cell-label">Adm. No:</div><div class="cell-value">${admNo}</div>
                            <div class="cell-label">Fathers Name:</div><div class="cell-value">${r[4] || ''}</div>
                            <div class="cell-label">D.O.B:</div><div class="cell-value">${r[7] || ''}</div>
                            <div class="cell-label">Mothers Name:</div><div class="cell-value">${r[5] || ''}</div>
                            <div class="cell-label">Class:</div><div class="cell-value">${r[2] || ''}</div>
                            <div class="cell-label">Session:</div><div class="cell-value">2024-25</div>
                            <div class="cell-label">Roll No:</div><div class="cell-value">${r[1] || ''}</div>
                        </div>
                        <div class="w-28 h-32 border-l-2 border-indigo-900 bg-gray-50 flex items-center justify-center">
                            ${photo ? `<img src="${photo}" class="w-full h-full object-cover">` : `<div class="text-[9px] text-gray-400 text-center">PHOTO<br>${admNo}</div>`}
                        </div>
                    </div>

                    <table class="mt-2">
                        <thead class="bg-indigo-100">
                            <tr>
                                <th rowspan="2" class="w-24">Subject</th>
                                <th colspan="6">Formative Assessment (FA)</th>
                                <th rowspan="2">Total (30)</th>
                                <th rowspan="2">Co-Curricular (20)</th>
                                <th rowspan="2">Summative (50)</th>
                                <th rowspan="2">Grand Total</th>
                            </tr>
                            <tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr>
                        </thead>
                        <tbody>
                            ${renderSubRow("English", r, 8)}
                            ${renderSubRow("Mathematics", r, 18)}
                            ${renderSubRow("Env. Science", r, 28)}
                            ${renderSubRow("Urdu", r, 38)}
                            ${renderSubRow("Kashmiri", r, 48)}
                        </tbody>
                    </table>

                    <div class="grid grid-cols-2 mt-4 gap-4">
                        <div class="border p-2 text-xs">
                            <div class="font-bold bg-gray-100 p-1 mb-1">General Remarks</div>
                            <p class="italic">${r[3]} has shown satisfactory performance in all areas.</p>
                        </div>
                        <div class="border p-2 text-xs">
                            <div class="font-bold bg-gray-100 p-1 mb-1">Attendance</div>
                            <p>Regularity: Good</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 mt-24 text-center border-t border-black pt-2 font-bold text-[10px]">
                        <div>Class Teacher</div><div>Exam Incharge</div><div>Parent Signature</div><div>Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
            }
        }

        function renderSubRow(name, r, start) {
            // Helper to get data based on column index from your screenshot
            return `<tr>
                <td class="sub-name">${name}</td>
                <td>${r[start] || '0'}</td><td>${r[start+1] || '0'}</td>
                <td>${r[start+2] || '0'}</td><td>${r[start+3] || '0'}</td>
                <td>${r[start+4] || '0'}</td><td>${r[start+5] || '0'}</td>
                <td class="bg-yellow-50 font-bold">${r[start+6] || '0'}</td>
                <td>${r[start+7] || '0'}</td>
                <td>${r[start+8] || '0'}</td>
                <td class="bg-indigo-50 font-bold">${r[start+9] || '0'}</td>
            </tr>`;
        }
    </script>
</body>
</html>
