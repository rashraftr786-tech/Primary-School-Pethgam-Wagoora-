<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Pethgam Wagoora - Official Marksheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } .page-break { page-break-after: always; } }
        body { background-color: #e2e8f0; padding: 20px; }
        .marksheet-container {
            width: 210mm; height: 285mm; padding: 10px; margin: auto;
            border: 5px solid #6d59c0; background-color: white; font-family: sans-serif;
            position: relative;
        }
        .header-bg { background-color: #6d59c0; color: white; border-bottom: 2px solid #000; text-align: center; }
        .cell-label { background-color: #e0e7ff; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 12px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 13px; font-weight: bold; text-align: center; color: #000; }
        table { border-collapse: collapse; width: 100%; margin-top: 2px; }
        th, td { border: 1px solid #94a3b8; text-align: center; font-size: 11px; padding: 4px; }
        .sub-name { color: #b91c1c; text-align: left; font-weight: bold; padding-left: 10px; font-size: 14px; }
        
        /* Proficiency/Result Section Styles */
        .section-header { background: #9333ea; color: white; text-align: center; font-weight: bold; font-size: 14px; padding: 4px; }
        .prof-box { display: flex; align-items: center; justify-content: space-between; padding: 2px 5px; border-bottom: 1px solid #ccc; height: 40px;}
        .grade-key td { padding: 2px; font-size: 10px; }
        
        /* Bar Graph */
        .chart-container { height: 120px; border: 1px solid #ccc; position: relative; display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 20px; }
        .chart-bar { width: 25px; background-color: #4f81bd; position: relative; border: 1px solid #000; }
        .chart-val { position: absolute; top: -15px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; }
        .chart-label { position: absolute; bottom: -18px; font-size: 9px; width: 60px; left: -17px; text-align: center; }

        .rank-box { background: #4b5563; color: white; text-align: center; padding: 2px; font-size: 12px; font-weight: bold; }
        .qualitative-label { background: #df695a; color: white; text-align: left; padding-left: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="no-print max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-xl mb-10 border-b-4 border-indigo-600">
        <h2 class="text-2xl font-bold text-indigo-900 mb-4">Control Panel</h2>
        <input type="file" id="excelUpload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-indigo-600 file:text-white" />
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                processData(rows);
            };
            reader.readAsArrayBuffer(file);
        });

        function getGrade(p) {
            if (p > 85) return 'A+'; if (p > 70) return 'A'; if (p > 55) return 'B';
            if (p > 40) return 'C'; if (p > 33) return 'D'; return 'E';
        }

                div.className = 'marksheet-container mb-10 page-break';

                        <div class="flex-grow grid grid-cols-4">
                            <div class="cell-label">Student Name:</div><div class="cell-value col-span-1">AAYAT RIYAZ WANI</div>

                            <div class="cell-label">Fathers Name:</div><div class="cell-value">RIYAZ AHMAD WANI</div>
                            <div class="cell-label">D.O.B:</div><div class="cell-value">03-03-2017</div>
                            <div class="cell-label">Mothers Name:</div><div class="cell-value">AFROZA BEGUM</div>
                            <div class="cell-label">Class:</div><div class="cell-value">3rd</div>

                            <div class="cell-label">Roll No:</div><div class="cell-value">303</div>
                            <div class="cell-label">Apaar ID:</div><div class="cell-value">Not Available</div>
                            <div class="cell-label">PEN No.:</div><div class="cell-value">22232018998</div>
                        </div>
                        <div class="w-28 h-32 border-2 border-indigo-900 ml-1 bg-gray-100 flex items-center justify-center text-xs">PHOTO</div>
                    </div>

                    <table class="mt-1">
                        <thead class="bg-indigo-100 text-[9px]">
                            <tr>
                                <th rowspan="2">Subject</th>
                                <th colspan="6">"FA" (5)</th>

                                <th rowspan="2">Grand Total (100)</th>

                            </tr>

                        <tbody>
                            <tr><td class="sub-name">English</td><td>3</td><td>3</td><td>4</td><td>4</td><td>4</td><td>5</td><td>23</td><td>16</td><td>38</td><td>77</td><td>A</td><td>Sky</td></tr>
                            <tr><td class="sub-name">Math</td><td>4</td><td>4</td><td>4</td><td>5</td><td>5</td><td>5</td><td>27</td><td>18</td><td>45</td><td>90</td><td>A+</td><td>Sky</td></tr>
                            <tr><td class="sub-name">EVS</td><td>4</td><td>4</td><td>4</td><td>4</td><td>5</td><td>5</td><td>26</td><td>17</td><td>43</td><td>86</td><td>A+</td><td>Sky</td></tr>
                            <tr><td class="sub-name">Urdu</td><td>4</td><td>4</td><td>4</td><td>5</td><td>5</td><td>5</td><td>27</td><td>18</td><td>45</td><td>90</td><td>A+</td><td>Sky</td></tr>
                            <tr><td class="sub-name">Kashmiri</td><td>3</td><td>4</td><td>4</td><td>4</td><td>5</td><td>5</td><td>25</td><td>17</td><td>41</td><td>83</td><td>A</td><td>Sky</td></tr>
                            <tr class="bg-gray-100 font-bold"><td>Grand Total</td><td>18</td><td>19</td><td>20</td><td>22</td><td>24</td><td>25</td><td>128</td><td>86</td><td>212</td><td>426</td><td>A+</td><td>Stream</td></tr>
                        </tbody>

                    <div class="grid grid-cols-3 mt-1 gap-1">

                                <tr><td>>33% to 40%</td><td>D</td></tr>
                                <tr><td>0% to 33%</td><td>E</td></tr>
                            </table>
                        </div>
                        <div>
                            <div class="section-header">Level of Proficiency</div>
                            <div class="border h-full">
                                <div class="prof-box"><span>Sky</span><img src="https://cdn-icons-png.flaticon.com/128/869/869869.png" class="h-6"> <span>✔</span></div>
                                <div class="prof-box"><span>Mountain</span><img src="https://cdn-icons-png.flaticon.com/128/616/616428.png" class="h-6"> <span></span></div>
                                <div class="prof-box"><span>Stream</span><img src="https://cdn-icons-png.flaticon.com/128/2910/2910115.png" class="h-6"> <span></span></div>

                    <div class="grid grid-cols-3 mt-1 gap-1">
                        <div class="rank-box">School Rank: 5</div>
                        <div class="bg-white"></div> <div class="rank-box">Class Rank: 1</div>

                    <div class="grid grid-cols-12 mt-1 border gap-1">

                            <div class="chart-container">
                                <div class="chart-bar" style="height: 77%"><div class="chart-val">77</div><div class="chart-label">Eng</div></div>
                                <div class="chart-bar" style="height: 90%"><div class="chart-val">90</div><div class="chart-label">Math</div></div>
                                <div class="chart-bar" style="height: 86%"><div class="chart-val">86</div><div class="chart-label">EVS</div></div>
                                <div class="chart-bar" style="height: 90%"><div class="chart-val">90</div><div class="chart-label">Urdu</div></div>
                                <div class="chart-bar" style="height: 83%"><div class="chart-val">83</div><div class="chart-label">Kash</div></div>
                            </div>
                        </div>
                        <div class="col-span-3 border">
                            <div class="bg-indigo-900 text-white text-center font-bold text-xs p-1">General Remarks</div>
                            <div class="p-2 text-[10px] leading-tight italic">
                                AAYAT RIYAZ WANI has performed well in English, Math, EVS, Urdu, Kashmiri. Keep it up!
                            </div>
                        </div>
                        <div class="col-span-4">
                            <table class="w-full">
                                <tr><td class="qualitative-label">Attendance %age</td><td class="w-10"></td></tr>
                                <tr><td class="qualitative-label">Empathy & Teamwork</td><td></td></tr>
                                <tr><td class="qualitative-label">Discipline</td><td></td></tr>
                                <tr><td class="qualitative-label">Sports</td><td></td></tr>
                                <tr><td class="qualitative-label">Art and Craft</td><td></td></tr>
                            </table>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 mt-16 text-center border-t border-black pt-2">
                        <div class="text-[10px] font-bold">Sign. Form Teacher</div>
                        <div class="text-[10px] font-bold">Sign. Exam I/C</div>
                        <div class="text-[10px] font-bold">Parents Signature</div>
                        <div class="text-[10px] font-bold">Seal & Signature of Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
            });
        }
    </script>
</body>
</html>
