<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Final Verified System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print { .no-print { display: none; } .page-break { page-break-after: always; } }
        .marksheet-container {
            width: 210mm; min-height: 297mm; padding: 10mm; margin: auto;
            border: 2px solid #6d59c0; background-color: white; font-family: 'Arial', sans-serif;
        }
        .header-bg { background-color: #6d59c0; color: white; border: 1px solid #000; }
        .cell-label { background-color: #f1f5f9; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 11px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 12px; font-weight: bold; text-align: center; color: #000; }
        table { border-collapse: collapse; width: 100%; margin-top: 8px; }
        th, td { border: 1px solid #94a3b8; text-align: center; font-size: 11px; padding: 5px; }
        .sub-name { color: #b91c1c; text-align: left; font-weight: bold; padding-left: 10px; }
        .sig-box { border-top: 1px solid black; width: 150px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 60px; }
    </style>
</head>
<body class="bg-gray-300 p-10">

    <div class="no-print max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-2xl mb-10 border-t-8 border-indigo-700">
        <h2 class="text-2xl font-bold text-indigo-900 mb-2">Final Marksheet Generator</h2>
        <p class="text-sm text-gray-600 mb-6 font-medium">Verified for Excel Columns A-R. All student details and English marks mapped.</p>
        <input type="file" id="excelUpload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer" />
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                processData(rows);
            };
            reader.readAsArrayBuffer(file);
        });

        function processData(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';
            
            // Skip headers, process from row index 3
            const students = rows.slice(3).filter(r => r[3]); 

            students.forEach(row => {
                const grandTotal = parseFloat(row[17]) || 0;
                const percentage = grandTotal.toFixed(0); // Assuming 100 is max for the English row
                
                // Mapping the student object
                const s = {
                    adm: row[0] || '', 
                    roll: row[1] || '', 
                    class: row[2] || '', 
                    name: row[3] || '',
                    father: row[4] || '', 
                    mother: row[5] || '', 
                    contact: row[6] || '', 
                    dob: row[7] instanceof Date ? row[7].toLocaleDateString('en-GB') : (row[7] || ''),
                    eng: {
                        fa: [row[8], row[9], row[10], row[11], row[12], row[13]],
                        totalFa: row[14] || 0, 
                        cc: row[15] || 0, 
                        summ: row[16] || 0, 
                        grand: grandTotal
                    },
                    percentage: percentage,
                    grade: grandTotal >= 85 ? 'A+' : grandTotal >= 70 ? 'A' : grandTotal >= 55 ? 'B' : 'C'
                };

                const div = document.createElement('div');
                div.className = 'marksheet-container mb-12 page-break shadow-lg';
                div.innerHTML = `
                    <div class="header-bg p-4 text-center rounded-t">
                        <h1 class="text-3xl font-black">GOVERNMENT PRIMARY SCHOOL</h1>
                        <h2 class="text-xl font-bold">PETHGAM WAGOORA 193109</h2>
                    </div>

                    <div class="grid grid-cols-6 mt-2">
                        <div class="cell-label">Student Name:</div><div class="cell-value col-span-2">${s.name}</div>
                        <div class="cell-label">Adm. No:</div><div class="cell-value col-span-2">${s.adm}</div>
                        <div class="cell-label">Fathers Name:</div><div class="cell-value col-span-2">${s.father}</div>
                        <div class="cell-label">D.O.B:</div><div class="cell-value col-span-2">${s.dob}</div>
                        <div class="cell-label">Mothers Name:</div><div class="cell-value col-span-2">${s.mother}</div>
                        <div class="cell-label">Class:</div><div class="cell-value col-span-2">${s.class}</div>
                        <div class="cell-label">Academic Session:</div><div class="cell-value col-span-2">2024-2025</div>
                        <div class="cell-label">Roll No:</div><div class="cell-value col-span-2">${s.roll}</div>
                        <div class="cell-label">Apaar ID:</div><div class="cell-value col-span-2">Not Available</div>
                        <div class="cell-label">PEN No.</div><div class="cell-value col-span-2">22232018998</div>
                    </div>

                    <table>
                        <thead class="bg-indigo-50">
                            <tr>
                                <th rowspan="2">Subject</th>
                                <th colspan="6">Formative Assessment (5x6=30)</th>
                                <th rowspan="2">Total<br>(30)</th>
                                <th rowspan="2">Co-Curr<br>(20)</th>
                                <th rowspan="2">Summ<br>(50)</th>
                                <th rowspan="2">Grand<br>(100)</th>
                                <th rowspan="2">Grade</th>
                                <th rowspan="2">Level</th>
                            </tr>
                            <tr class="text-[9px]">
                                <th>FA1</th><th>FA2</th><th>FA3</th><th>FA4</th><th>FA5</th><th>FA6</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="sub-name text-red-700">English</td>
                                ${s.eng.fa.map(v => `<td>${v || 0}</td>`).join('')}
                                <td class="font-bold">${s.eng.totalFa}</td>
                                <td>${s.eng.cc}</td>
                                <td>${s.eng.summ}</td>
                                <td class="font-bold bg-yellow-50">${s.eng.grand}</td>
                                <td class="font-bold text-green-700">${s.grade}</td>
                                <td>Sky</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="grid grid-cols-3 gap-4 mt-6">
                        <div class="border border-slate-300">
                            <div class="bg-purple-800 text-white text-xs p-1 font-bold text-center uppercase">Percentage Key</div>
                            <div class="p-2 text-[10px] leading-tight">
                                >85% to 100%: <b>A+</b> <br>
                                >70% to 85%: <b>A</b> <br>
                                >55% to 70%: <b>B</b>
                            </div>
                        </div>
                        <div class="border border-slate-300 text-center">
                            <div class="bg-red-600 text-white text-xs p-1 font-bold uppercase">Level of Proficiency</div>
                            <div class="p-3 text-xs font-bold">Sky (✔)<br><span class="text-[9px] text-gray-500">School Rank: 5</span></div>
                        </div>
                        <div class="border border-slate-300">
                            <div class="bg-purple-800 text-white text-xs p-1 font-bold text-center uppercase">Final Results</div>
                            <div class="p-2 text-xs font-bold leading-relaxed">
                                Total Obtained: ${s.eng.grand} <br>
                                Percentage: ${s.percentage}% <br>
                                Class Rank: 1
                            </div>
                        </div>
                    </div>

                    <div class="mt-20 flex justify-between px-2">
                        <div class="sig-box">Sign. Form Teacher</div>
                        <div class="sig-box">Sign. Exam I/C</div>
                        <div class="sig-box">Parents Signature</div>
                        <div class="sig-box">Seal & Sign. Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
            });
        }
    </script>
</body>
</html>
                                                    <div class="sig-box">Parents Signature</div>
