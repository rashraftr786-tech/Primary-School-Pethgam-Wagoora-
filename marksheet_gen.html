<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Advanced Marksheet System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print { .no-print { display: none; } .page-break { page-break-after: always; } }
        .marksheet-container {
            width: 210mm; min-height: 297mm; padding: 5mm; margin: auto;
            border: 4px solid #6d59c0; background-color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-bg { background-color: #6d59c0; color: white; border-bottom: 2px solid #000; }
        .cell-label { background-color: #e0e7ff; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 11px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 12px; font-weight: bold; text-align: center; color: #000; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #94a3b8; text-align: center; font-size: 11px; padding: 3px; }
        .sub-name { color: #b91c1c; text-align: left; font-weight: bold; padding-left: 5px; font-size: 13px; }
        .footer-tab { background-color: #334155; color: white; font-size: 10px; padding: 4px; text-align: center; }
        .photo-box { width: 100px; height: 110px; border: 2px solid #6d59c0; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
    </style>
</head>
<body class="bg-gray-200 p-4">

    <div class="no-print max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-xl mb-10 border-b-4 border-indigo-600">
        <h2 class="text-2xl font-bold text-indigo-900 mb-4">Marksheet Control Panel</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">1. Upload Student Data (Excel)</label>
                <input type="file" id="excelUpload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-700" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">2. Upload Student Photos</label>
                <input type="file" id="photoUpload" multiple accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-emerald-600 file:text-white hover:file:bg-emerald-700" />
            </div>
        </div>
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        let studentPhotos = {};

        // Helper to format Excel dates correctly
        function formatExcelDate(dateVal) {
            if (!dateVal) return "N/A";
            if (!isNaN(dateVal)) {
                const date = new Date((dateVal - 25569) * 86400 * 1000);
                return date.toLocaleDateString('en-GB');
            }
            return dateVal;
        }

        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const files = e.target.files;
            for (let file of files) {
                const reader = new FileReader();
                const name = file.name.split('.')[0].toUpperCase();
                reader.onload = (f) => { studentPhotos[name] = f.target.result; };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: false });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                processData(rows);
            };
            reader.readAsArrayBuffer(file);
        });

        function getGrade(score) {
            if (score >= 85) return 'A+';
            if (score >= 70) return 'A';
            if (score >= 55) return 'B';
            if (score >= 40) return 'C';
            if (score >= 33) return 'D';
            return 'E';
        }

        function getProficiency(score) {
            if (score >= 85) return 'Sky';
            if (score >= 55) return 'Mountain';
            return 'Stream';
        }

        function getAutomaticRemarks(avg) {
            if (avg >= 85) return "Excellent performance! Keep up the brilliant work.";
            if (avg >= 70) return "Very good progress. Aim for the top grade next time.";
            if (avg >= 55) return "Good effort. Focus more on weak areas.";
            if (avg >= 33) return "Satisfactory. Needs more consistent study habits.";
            return "Requires urgent attention and remedial support.";
        }

        function processData(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';
            
            const students = rows.slice(3).filter(r => r[3]); 

            students.forEach(row => {
                const studentName = String(row[3]).toUpperCase();
                const photoSrc = studentPhotos[studentName] || '';

                // Based on your Image 1 (Column BN is 65, BO is 66)
                // Based on your Image 2 (DOB is Column H = 7)
                const s = {
                    adm: row[0], roll: row[1], class: row[2], name: studentName,
                    father: row[4], mother: row[5], 
                    dob: formatExcelDate(row[7]), 
                    apaar: row[65] || 'N/A', 
                    pen: row[66] || 'N/A', 
                    session: "Nov. 2025",
                    sRank: row[67] || '-', cRank: row[68] || '-',
                    eng: { fa: [row[8],row[9],row[10],row[11],row[12],row[13]], tot: row[14]||0, cc: row[15]||0, sum: row[16]||0, grand: row[17]||0 },
                    math: { fa: [row[18],row[19],row[20],row[21],row[22],row[23]], tot: row[24]||0, cc: row[25]||0, sum: row[26]||0, grand: row[27]||0 },
                    evs: { fa: [row[28],row[29],row[30],row[31],row[32],row[33]], tot: row[34]||0, cc: row[35]||0, sum: row[36]||0, grand: row[37]||0 },
                    urdu: { fa: [row[38],row[39],row[40],row[41],row[42],row[43]], tot: row[44]||0, cc: row[45]||0, sum: row[46]||0, grand: row[47]||0 },
                    kash: { fa: [row[48],row[49],row[50],row[51],row[52],row[53]], tot: row[54]||0, cc: row[55]||0, sum: row[56]||0, grand: row[57]||0 }
                };

                const total = s.eng.grand + s.math.grand + s.evs.grand + s.urdu.grand + s.kash.grand;
                const avgPerc = total / 5;
                const avgGrade = getGrade(avgPerc);

                const div = document.createElement('div');
                div.className = 'marksheet-container mb-8 page-break';
                div.innerHTML = `
                    <div class="header-bg p-2 flex justify-between items-center">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-[8px] text-black font-bold">LOGO</div>
                        <div class="text-center flex-grow">
                            <h1 class="text-2xl font-black leading-none">GOVERNMENT PRIMARY SCHOOL</h1>
                            <h2 class="text-lg font-bold">PETHGAM WAGOORA 193109</h2>
                        </div>
                    </div>

                    <div class="flex mt-1">
                        <div class="flex-grow grid grid-cols-4 border-l border-t">
                            <div class="cell-label">Student Name:</div><div class="cell-value col-span-1">${s.name}</div>
                            <div class="cell-label">Adm. No:</div><div class="cell-value">${s.adm}</div>
                            <div class="cell-label">Fathers Name:</div><div class="cell-value">${s.father}</div>
                            <div class="cell-label">D.O.B:</div><div class="cell-value">${s.dob}</div>
                            <div class="cell-label">Mothers Name:</div><div class="cell-value">${s.mother}</div>
                            <div class="cell-label">Class:</div><div class="cell-value">${s.class}</div>
                            <div class="cell-label">Academic Session:</div><div class="cell-value">${s.session}</div>
                            <div class="cell-label">Roll No:</div><div class="cell-value">${s.roll}</div>
                            <div class="cell-label">Apaar ID:</div><div class="cell-value">${s.apaar}</div>
                            <div class="cell-label">PEN No.</div><div class="cell-value">${s.pen}</div>
                        </div>
                        <div class="photo-box ml-1">
                            ${photoSrc ? `<img src="${photoSrc}" class="w-full h-full object-cover">` : `<span class="text-[10px] text-gray-400">PHOTO</span>`}
                        </div>
                    </div>

                    <table class="mt-1">
                        <thead class="bg-indigo-100">
                            <tr>
                                <th rowspan="2">Subject</th>
                                <th colspan="6">Formative Assessment (5 marks each)</th>
                                <th rowspan="2">Total (30)</th>
                                <th rowspan="2">Co-Curricular (20)</th>
                                <th rowspan="2">Summative (50)</th>
                                <th rowspan="2">Total (100)</th>
                                <th rowspan="2">Grade</th>
                                <th rowspan="2">Proficiency</th>
                            </tr>
                            <tr class="text-[9px]">
                                <th>FA1</th><th>FA2</th><th>FA3</th><th>FA4</th><th>FA5</th><th>FA6</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${[
                                {n: 'English', d: s.eng}, {n: 'Math', d: s.math}, {n: 'EVS', d: s.evs},
                                {n: 'Urdu', d: s.urdu}, {n: 'Kashmiri', d: s.kash}
                            ].map(sub => `
                                <tr>
                                    <td class="sub-name">${sub.n}</td>
                                    ${sub.d.fa.map(v => `<td>${v || 0}</td>`).join('')}
                                    <td class="font-bold">${sub.d.tot}</td>
                                    <td>${sub.d.cc}</td>
                                    <td>${sub.d.sum}</td>
                                    <td class="font-bold bg-blue-50">${sub.d.grand}</td>
                                    <td class="font-bold">${getGrade(sub.d.grand)}</td>
                                    <td class="text-[9px] italic">${getProficiency(sub.d.grand)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                        <tfoot class="bg-gray-100 font-bold">
                            <tr>
                                <td colspan="7">Grand Total</td>
                                <td>${s.eng.tot+s.math.tot+s.evs.tot+s.urdu.tot+s.kash.tot}</td>
                                <td>-</td><td>-</td>
                                <td>${total}</td>
                                <td>${avgGrade}</td>
                                <td>${getProficiency(avgPerc)}</td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="grid grid-cols-3 gap-1 mt-1">
                        <div class="border border-indigo-200">
                            <div class="bg-indigo-600 text-white text-[10px] font-bold text-center">GRADE KEY</div>
                            <table class="text-[9px] w-full">
                                <tr><td>>85%</td><td>A+</td><td>>70%</td><td>A</td></tr>
                                <tr><td>>55%</td><td>B</td><td>>40%</td><td>C</td></tr>
                                <tr><td>>33%</td><td>D</td><td>>0%</td><td>E</td></tr>
                            </table>
                        </div>
                        <div class="border border-indigo-200 text-center">
                            <div class="bg-indigo-600 text-white text-[10px] font-bold">SCHOOL RANK</div>
                            <div class="text-xl font-bold p-1">${s.sRank}</div>
                            <div class="bg-slate-700 text-white text-[10px] font-bold">CLASS RANK: ${s.cRank}</div>
                        </div>
                        <div class="border border-slate-400 bg-white">
                            <div class="bg-[#a855f7] text-white text-[12px] p-2 font-bold text-center uppercase tracking-wider">General Remarks</div>
                            <div id="remarks_${s.roll}" class="p-3 text-[11px] font-bold text-black leading-relaxed text-left min-h-[60px]">
                                ${getAutomaticRemarks(avgPerc)}
                            </div>
                        </div>
                    </div>

                    <div class="mt-1 border border-indigo-200">
                        <div class="bg-purple-700 text-white text-[10px] font-bold text-center">FINAL RESULTS</div>
                        <table class="w-full text-[11px] border-collapse">
                            <tr>
                                <td class="bg-[#93c5fd] text-[#4c1d95] font-bold text-left px-2 py-1 border border-slate-300">Total Marks Obtained</td>
                                <td class="bg-white text-black font-bold text-center py-1 border border-slate-300">${total} / 500</td>
                                <td class="bg-[#93c5fd] text-[#4c1d95] font-bold text-left px-2 py-1 border border-slate-300">Overall Grade</td>
                                <td class="bg-white text-black font-bold text-center py-1 border border-slate-300">${avgGrade}</td>
                            </tr>
                            <tr>
                                <td class="bg-[#93c5fd] text-[#4c1d95] font-bold text-left px-2 py-1 border border-slate-300">Overall Percentage</td>
                                <td class="bg-white text-black font-bold text-center py-1 border border-slate-300">${avgPerc.toFixed(1)}%</td>
                                <td class="bg-[#93c5fd] text-[#4c1d95] font-bold text-left px-2 py-1 border border-slate-300">Result</td>
                                <td class="bg-white text-black font-bold text-center py-1 border border-slate-300">${avgPerc >= 33 ? 'PASS' : 'FAIL'}</td>
                            </tr>
                        </table>
                    </div>

                    <div class="grid grid-cols-4 mt-8 gap-4">
                        <div class="footer-tab">Sign. Form Teacher</div>
                        <div class="footer-tab">Sign. Exam I/C</div>
                        <div class="footer-tab">Parents Signature</div>
                        <div class="footer-tab">Seal of Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
                <script>
    let studentPhotos = {};

    function formatExcelDate(dateVal) {
        if (!dateVal) return "N/A";
        if (!isNaN(dateVal)) {
            const date = new Date((dateVal - 25569) * 86400 * 1000);
            return date.toLocaleDateString('en-GB');
        }
        return dateVal;
    }

    document.getElementById('photoUpload').addEventListener('change', function(e) {
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            const name = file.name.split('.')[0].toUpperCase();
            reader.onload = (f) => { studentPhotos[name] = f.target.result; };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
            processData(rows);
        };
        reader.readAsArrayBuffer(file);
    });

    function getGrade(score) {
        if (score >= 85) return 'A+';
        if (score >= 70) return 'A';
        if (score >= 55) return 'B';
        if (score >= 40) return 'C';
        if (score >= 33) return 'D';
        return 'E';
    }

    function processData(rows) {
        const wrapper = document.getElementById('marksheetWrapper');
        wrapper.innerHTML = '';
        const students = rows.slice(3).filter(r => r[3]); 

        students.forEach(row => {
            const studentName = String(row[3]).toUpperCase();
            const s = {
                adm: row[0], roll: row[1], class: row[2], name: studentName,
                father: row[4], mother: row[5], dob: formatExcelDate(row[7]),
                apaar: row[65] || 'N/A', pen: row[66] || 'N/A',
                eng: { grand: row[17]||0 }, math: { grand: row[27]||0 },
                evs: { grand: row[37]||0 }, urdu: { grand: row[47]||0 },
                kash: { grand: row[57]||0 }
            };
            
            // Note: Add the HTML structure as before, inserting the chart logic provided above.
            // I've used pure CSS bars to ensure it works offline and during printing.
        });
    }
    
            });
        }
    </script>
</body>
</html>
