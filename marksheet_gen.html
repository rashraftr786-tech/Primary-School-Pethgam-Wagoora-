<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Multi-Subject System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print { .no-print { display: none; } .page-break { page-break-after: always; } }
        .marksheet-container {
            width: 210mm; min-height: 297mm; padding: 10mm; margin: auto;
            border: 2px solid #6d59c0; background-color: white; font-family: 'Arial', sans-serif;
        }
        .header-bg { background-color: #6d59c0; color: white; border: 1px solid #000; }
        .cell-label { background-color: #f1f5f9; color: #1e40af; font-weight: bold; border: 1px solid #94a3b8; padding: 4px; font-size: 11px; }
        .cell-value { border: 1px solid #94a3b8; padding: 4px; font-size: 12px; font-weight: bold; text-align: center; color: #000; }
        table { border-collapse: collapse; width: 100%; margin-top: 8px; }
        th, td { border: 1px solid #94a3b8; text-align: center; font-size: 10px; padding: 4px; }
        .sub-name { color: #b91c1c; text-align: left; font-weight: bold; padding-left: 5px; }
        .sig-box { border-top: 1px solid black; width: 140px; text-align: center; font-size: 10px; font-weight: bold; margin-top: 45px; }
    </style>
</head>
<body class="bg-gray-300 p-10">

    <div class="no-print max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-2xl mb-10 border-t-8 border-indigo-700">
        <h2 class="text-2xl font-bold text-indigo-900 mb-2">Final Marksheet Generator</h2>
        <p class="text-sm text-gray-600 mb-6">Processing subjects: English, Math, EVS, Urdu, & Kashmiri.</p>
        <input type="file" id="excelUpload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-lg file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer" />
    </div>

    <div id="marksheetWrapper"></div>

    <script>
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                processData(rows);
            };
            reader.readAsArrayBuffer(file);
        });

        function getGrade(score) {
            if (score >= 85) return 'A+';
            if (score >= 70) return 'A';
            if (score >= 55) return 'B';
            if (score >= 40) return 'C';
            return 'D';
        }

        function processData(rows) {
            const wrapper = document.getElementById('marksheetWrapper');
            wrapper.innerHTML = '';
            
            // Skip headers (Rows 1-3), process students from Row 4 (index 3)
            const students = rows.slice(3).filter(r => r[3]); 

            students.forEach(row => {
                // Map function to handle subject data chunks
                const mapSub = (startIdx) => ({
                    fa: [row[startIdx], row[startIdx+1], row[startIdx+2], row[startIdx+3], row[startIdx+4], row[startIdx+5]],
                    totalFa: row[startIdx+6] || 0,
                    cc: row[startIdx+7] || 0,
                    summ: row[startIdx+8] || 0,
                    grand: row[startIdx+9] || 0
                });

                const s = {
                    adm: row[0], roll: row[1], class: row[2], name: row[3],
                    father: row[4], mother: row[5], dob: row[7] instanceof Date ? row[7].toLocaleDateString('en-GB') : row[7],
                    eng: mapSub(8),    // Col I (8)
                    math: mapSub(18),   // Col S (18)
                    evs: mapSub(28),    // Col AC (28)
                    urdu: mapSub(38),   // Col AM (38)
                    kash: mapSub(48)    // Col AW (48)
                };

                const totalObtained = s.eng.grand + s.math.grand + s.evs.grand + s.urdu.grand + s.kash.grand;
                const percentage = (totalObtained / 5).toFixed(1);

                const div = document.createElement('div');
                div.className = 'marksheet-container mb-12 page-break shadow-lg';
                div.innerHTML = `
                    <div class="header-bg p-4 text-center rounded-t">
                        <h1 class="text-3xl font-black">GOVERNMENT PRIMARY SCHOOL</h1>
                        <h2 class="text-xl font-bold">PETHGAM WAGOORA 193109</h2>
                    </div>

                    <div class="grid grid-cols-6 mt-2">
                        <div class="cell-label">Student Name:</div><div class="cell-value col-span-2">${s.name}</div>
                        <div class="cell-label">Adm. No:</div><div class="cell-value col-span-2">${s.adm}</div>
                        <div class="cell-label">Fathers Name:</div><div class="cell-value col-span-2">${s.father}</div>
                        <div class="cell-label">D.O.B:</div><div class="cell-value col-span-2">${s.dob}</div>
                        <div class="cell-label">Mothers Name:</div><div class="cell-value col-span-2">${s.mother}</div>
                        <div class="cell-label">Class:</div><div class="cell-value col-span-2">${s.class}</div>
                    </div>

                    <table>
                        <thead class="bg-indigo-50">
                            <tr>
                                <th rowspan="2">Subject</th>
                                <th colspan="6">Formative Assessment (30)</th>
                                <th rowspan="2">FA Total</th>
                                <th rowspan="2">Co-Curr (20)</th>
                                <th rowspan="2">Summ (50)</th>
                                <th rowspan="2">Grand (100)</th>
                                <th rowspan="2">Grade</th>
                            </tr>
                            <tr class="text-[8px]">
                                <th>F1</th><th>F2</th><th>F3</th><th>F4</th><th>F5</th><th>F6</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${[
                                {n: 'English', d: s.eng},
                                {n: 'Mathematics', d: s.math},
                                {n: 'Env. Science', d: s.evs},
                                {n: 'Urdu', d: s.urdu},
                                {n: 'Kashmiri', d: s.kash}
                            ].map(sub => `
                                <tr>
                                    <td class="sub-name">${sub.n}</td>
                                    ${sub.d.fa.map(v => `<td>${v || 0}</td>`).join('')}
                                    <td class="font-bold">${sub.d.totalFa}</td>
                                    <td>${sub.d.cc}</td>
                                    <td>${sub.d.summ}</td>
                                    <td class="font-bold bg-yellow-50">${sub.d.grand}</td>
                                    <td class="font-bold">${getGrade(sub.d.grand)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="grid grid-cols-3 gap-4 mt-4">
                        <div class="border border-slate-300">
                            <div class="bg-purple-800 text-white text-[10px] p-1 font-bold text-center uppercase">Grade Key</div>
                            <div class="p-2 text-[9px] leading-tight text-center font-bold">
                                A+: 85-100% | A: 70-84% | B: 55-69% | C: 40-54%
                            </div>
                        </div>
                        <div class="border border-slate-300 text-center flex flex-col justify-center">
                            <div class="bg-red-600 text-white text-[10px] p-1 font-bold uppercase">Result</div>
                            <div class="p-2 text-sm font-black text-green-700">PROMOTED</div>
                        </div>
                        <div class="border border-slate-300">
                            <div class="bg-purple-800 text-white text-[10px] p-1 font-bold text-center uppercase">Performance</div>
                            <div class="p-2 text-[11px] font-bold">
                                Total: ${totalObtained} / 500 <br>
                                Percentage: ${percentage}%
                            </div>
                        </div>
                    </div>

                    <div class="mt-16 flex justify-between px-2">
                        <div class="sig-box">Teacher</div>
                        <div class="sig-box">Exam I/C</div>
                        <div class="sig-box">Parent</div>
                        <div class="sig-box">Headmaster</div>
                    </div>
                `;
                wrapper.appendChild(div);
            });
        }
    </script>
</body>
</html>
