<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPS Pethgam Wagoora - Digital Register</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #5b2c91; --bg-light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-light); margin: 0; padding: 20px; display: flex; gap: 20px; }
        
        /* UPDATION FORM STYLE */
        .admin-panel { width: 350px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); height: fit-content; sticky: top 20px; }
        .admin-panel h2 { color: var(--primary); font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid var(--primary); }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 3px; }
        input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* A4 MARKSHEET STYLE */
        .a4-container { 
            width: 8.27in; height: 11.69in; background: white; padding: 0.4in; box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; font-size: 12px; 
        }
        .header-flex { display: flex; align-items: center; background: var(--primary); color: white; padding: 10px; border-radius: 5px; gap: 15px; }
        .school-logo { width: 70px; height: 70px; background: white; border-radius: 50%; padding: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #f2f0f7; color: var(--primary); font-size: 11px; }

        /* BAR GRAPH STYLE */
        .graph-container { margin-top: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        .chart-area { display: flex; align-items: flex-end; justify-content: space-around; height: 120px; padding-top: 20px; border-bottom: 2px solid #333; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 50px; }
        .bar { width: 30px; background: var(--primary); transition: height 0.3s ease; position: relative; border-radius: 3px 3px 0 0; }
        .bar-value { position: absolute; top: -18px; font-size: 10px; font-weight: bold; }
        .subject-label { font-size: 10px; margin-top: 5px; font-weight: bold; }

        .signatures { display: flex; justify-content: space-between; position: absolute; bottom: 0.5in; left: 0.4in; right: 0.4in; }
        .sig-box { width: 1.5in; border-top: 1px solid #333; text-align: center; padding-top: 5px; font-size: 11px; }
        
        @media print { .admin-panel { display: none; } }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>Result Updation Form</h2>
        <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="in-name" value="AAYAT RIYAZ WANI" oninput="syncData()">
        </div>
        <div class="input-group">
            <label>Admission No</label>
            <input type="text" id="in-adm" value="133" oninput="syncData()">
        </div>
        <hr>
        <label>Subject Marks (Out of 100)</label>
        <div class="input-group">
            <label>English</label><input type="number" id="in-eng" value="77" oninput="syncData()">
            <label>Math</label><input type="number" id="in-math" value="90" oninput="syncData()">
            <label>EVS</label><input type="number" id="in-evs" value="86" oninput="syncData()">
            <label>Urdu</label><input type="number" id="in-urdu" value="90" oninput="syncData()">
            <label>Kashmiri</label><input type="number" id="in-kash" value="83" oninput="syncData()">
        </div>
        
        <div class="btn-group">
            <button onclick="saveToRegister()" style="background: #28a745; color: white; padding: 10px; border: none; cursor: pointer;">Save to Register</button>
            <button onclick="generatePDF()" style="background: var(--primary); color: white; padding: 10px; border: none; cursor: pointer;">Generate Marksheet PDF</button>
        </div>
    </div>

    <div class="a4-container" id="marksheet">
        <div class="header-flex">
            <img src="https://via.placeholder.com/70" alt="Logo" class="school-logo">
            <div style="flex-grow: 1;">
                <h1>GOVERNMENT PRIMARY SCHOOL</h1>
                <h2>PETHGAM WAGOORA 193109</h2>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
            <div><strong>Name:</strong> <span id="out-name">AAYAT RIYAZ WANI</span></div>
            <div><strong>Adm No:</strong> <span id="out-adm">133</span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Grand Total (100)</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr><td style="text-align:left">English</td><td id="out-eng">77</td><td id="grd-eng">A</td></tr>
                <tr><td style="text-align:left">Math</td><td id="out-math">90</td><td id="grd-math">A+</td></tr>
                <tr><td style="text-align:left">EVS</td><td id="out-evs">86</td><td id="grd-evs">A+</td></tr>
                <tr><td style="text-align:left">Urdu</td><td id="out-urdu">90</td><td id="grd-urdu">A+</td></tr>
                <tr><td style="text-align:left">Kashmiri</td><td id="out-kash">83</td><td id="grd-kash">A</td></tr>
            </tbody>
        </table>

        <div class="graph-container">
            <h3 style="text-align:center; margin: 0 0 10px 0; font-size: 14px;">Subject Performance Chart</h3>
            <div class="chart-area">
                <div class="bar-wrapper"><div class="bar" id="bar-eng" style="height: 77%;"><span class="bar-value">77</span></div><div class="subject-label">Eng</div></div>
                <div class="bar-wrapper"><div class="bar" id="bar-math" style="height: 90%;"><span class="bar-value">90</span></div><div class="subject-label">Math</div></div>
                <div class="bar-wrapper"><div class="bar" id="bar-evs" style="height: 86%;"><span class="bar-value">86</span></div><div class="subject-label">EVS</div></div>
                <div class="bar-wrapper"><div class="bar" id="bar-urdu" style="height: 90%;"><span class="bar-value">90</span></div><div class="subject-label">Urdu</div></div>
                <div class="bar-wrapper"><div class="bar" id="bar-kash" style="height: 83%;"><span class="bar-value">83</span></div><div class="subject-label">Kash</div></div>
            </div>
        </div>

        <div class="signatures">
            <div class="sig-box">Class Teacher</div>
            <div class="sig-box">Headmaster</div>
        </div>
    </div>

    <script>
        // FUNCTION: Real-time Update (Sync Form to Marksheet)
        function syncData() {
            const subjects = ['eng', 'math', 'evs', 'urdu', 'kash'];
            
            // Sync Header Info
            document.getElementById('out-name').innerText = document.getElementById('in-name').value;
            document.getElementById('out-adm').innerText = document.getElementById('in-adm').value;

            // Sync Marks, Grades, and Graph Bars
            subjects.forEach(sub => {
                const val = document.getElementById('in-' + sub).value || 0;
                document.getElementById('out-' + sub).innerText = val;
                
                // Update Bar Graph
                const bar = document.getElementById('bar-' + sub);
                bar.style.height = val + '%';
                bar.querySelector('.bar-value').innerText = val;

                // Simple Grade Logic
                let grade = 'E';
                if(val > 85) grade = 'A+';
                else if(val > 70) grade = 'A';
                else if(val > 55) grade = 'B';
                else if(val > 33) grade = 'C';
                document.getElementById('grd-' + sub).innerText = grade;
            });
        }

        // FUNCTION: Simulate saving to General Register (Database)
        function saveToRegister() {
            const data = {
                name: document.getElementById('in-name').value,
                marks: {
                    eng: document.getElementById('in-eng').value,
                    math: document.getElementById('in-math').value
                }
            };
            console.log("Data saved to Register:", data);
            alert("Results for " + data.name + " updated in Register successfully!");
        }

        // FUNCTION: Generate A4 PDF
        function generatePDF() {
            const element = document.getElementById('marksheet');
            const opt = {
                margin: 0,
                filename: 'Marksheet.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
